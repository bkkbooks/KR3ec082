body:
  text: 第一章緒論漢藥牛黃即牛之膽石自古用為止痙鎮靜治風解熱解毒或長生不老之妙藥近來膽汁之生物學的研究日漸發達因對於研究膽石亦覺饒趣自明瞭膽汁有造血之機能不久即有螺良氏研究牛黃之此種機能而發見膽汁有免疫作用繼而有小今井氏檢查牛黃亦有同樣之免疫作用因此古今所讚賞之漢藥牛黃在治病上效能之一部已得解決然其大部效能尚在神秘不明中須待多數學者之探索余亦想研究一點供獻已於去秋開始茲將類集中日兩國之關於牛黃之文獻作為第一報告第二章牛黃之名義及異同一牛黃之定義名醫別錄曰牛黃生隴西及晉地特特為牡之誤牛膽中得之即陰乾百日使燥無令見日月光吳普本草曰牛死則黃入膽如雞子黃也本經便讀曰牛黃大抵皆因牛病而成黃每結於肝膽之間因殺病牛而得之膽中由此可知牛黃顯然為牛之膽石但名醫別錄所謂生於特牛膽中者非也按本草綱目特牛即牡牛是謂牛黃單指為牡牛之膽石其實在他醫書均未道及於此故膽石之差別與牛之牡牝無關可均稱為牛黃也二牛黃之異名及其他牛黃自古異名甚多可約記如下土精千金方外臺秘要人參亦有此異名醜寶本草綱目時珍曰牛屬醜故隱其名醜玄萬春回春牛菜出所不明瞿盧折娜金光明經在日本牛黃讀音為高瓦屋其和名為字之乃多末然高瓦屋之音由來甚久已見於續日本紀中有所謂文武二皇二年正月己巳士佐國獻牛黃十一月己酉下總國獻牛黃之紀錄康賴本草獸部上品中始記牛黃和名為宇之乃知至日本戰國時代前後又名為宇之乃多末曲直瀨道三之藥性能毒大成古類禽部中記有牛黃和名為宇之乃多末三牛黃之種類及其分類法種類及分類因時代而異先就中國而言雷斅曰牛黃有四種喝迫而得者名生神黃殺死在角中得者名角中黃牛病死後心中剝得者名心黃初在心中如黃漿汁取得使投水中沾水乃硬如碎蒺藜及豆與啻珠子者是也膽肝中得者名膽黃或肝黃大抵皆不及生神黃為勝陶弘景曰舊曰神牛出入鳴吼者有牛黃伺其出以盆水承而吐之即墮落水中今人皆在膽中得之其後新修本草載有牛有黃者必多鳴吼喝迫而得謂之生黃最佳黃有三種散黃粒如麻豆漫黃若雞卵中黃漿在肝膽間圓黃為塊形大小並在肝膽中由上可知在南北朝時因採黃之部位不同而分生神黃角中黃心黃肝黃四種其後因多系得於肝膽之間故至唐朝只按形狀大小而別為散黃漫黃圓黃三種唐後迄宋竇太師方之治鎖喉毒其牛黃清心丸之處方中有京牛黃明朝之證治準繩中有西牛黃等字樣清代之本經逢源又載有產西戎者為西黃產廣東者名廣黃清代之本草便讀內載有牛黃有廣黃西黃兩種以所出之地而命名由上可知宋而後漸因產地而命名分類但圖經本草本草綱目本草述諸書中亦曾記述雷斅之所謂生神黃等四種大觀本草本草綱目中又記載蘇敬之所謂散漫圓黃三種然則此等分類法是否在唐後仍被採用實難推知現在則僅由產地而命名分類據余在當地之調查如下一東牛黃山海關以東即關東所產者按近世病理學上之分類多系結石石及純石等概屬少見是或由於氣候風土飲食之關係而然其最大者如雞卵多為球形或不定形黃綠乃至暗綠色有乾燥黏土樣之硬度割面皆呈輪狀層二西牛黃西黃為西方如甘肅陝西山西河北等地所產者因其離京稍近故亦名京黃多為結石然均系之含量多於之含量呈球形或不定形比東牛黃稍小黃綠色乃至黃褐色割面為球心性層狀三蘇尖黃產於江浙及中國中部多為結石但其之含量較西黃內所含者為少之含量較西黃所含者為多往往多數生於膽囊中形小而光滑呈骰豆形或不定形藥鋪內所藏者多置於三角錐形之器中故有蘇尖之名色褐乃至暗褐質甚硬割面皆為重疊層四廣黃產於兩廣亦均為結石而之含量較蘇黃尤少含量甚大形狀不定較蘇黃稍大表面平滑或凹凸不平呈灰色割面為球心性層狀質軟易碎故亦有片黃之稱但他黃之破碎者有時亦稱片黃其未破碎者又稱個黃以上四種皆因產地而得名其外他地所產者亦因性狀而類於四種之一但近時又有印度南北美洲澳洲日本等之輸入品由印度輸入者均重左右封入匣內近藤龍雄著中國北部之物資藥物研究內載中國稅關對於牛黃分二種將中國牛黃一匁日本兩為十八海關兩印度牛黃一匁為七十五海關兩之評價均為一斤之輸出稅為海關兩輸入稅為海關兩總上可知古時因取黃之部位有生神黃角中黃心黃肝黃四種唐代以後漸因形狀而分為散漫圓黃三種今則純以產地而別為東牛黃西牛黃蘇尖黃廣黃四種就日本而言德川初期之本朝食鑑有黃者牛之黃病也雖有神牛四種黃之說俱不足用之大抵有黃之牛多病而易死或疫癘之死牛皆有黃在心及肝膽之間往昔余據宗澤時珍之說教播州郡守而取病死牛之黃後豫州郡守亦取之俱得其真外面黃赤黑色重疊成片內有真黃如黃蘗色是不減於自華來者入藥亦佳但恨世人泥神牛之說不敢取病死之黃矣故知亦有生神黃等之分類但始於何代已無可考由推測而言則遠在德川時代以前想亦系傳自中國然散漫圓黃等之分類似乎亦被介紹而採用如平安朝之輔仁本草內有牛黃蘇敬注曰乍生咀相而得者也漫黃如雞子黃散黃粒如麻豆圓黃塊形有大小以上蘇敬注但他書如藥經太素康賴本草亦為平安朝之醫書皆未記載牛黃之分類故此等分類是否當時施行尚屬不明現代則只有以下分類一玉牛黃球形橢圓形或純三角形呈赤黃色二天竺牛黃形稍大往往成為破碎俗稱四六三真牛黃或真正牛黃即日本產黑色稍大附言在日本昔時醫療用之牛黃多由中國輸入輔仁本草所記諸藥凡產於日本者則附以和名記其產地否則注以唐字以志區別如牛黃唐等是也以後漸有和產德川時代之千金方藥注載有牛黃來自紅毛和者出於近江本草綱目啟蒙有牛黃為舶來品中略今有和產亦可應用藥鋪稱為真牛黃自明治維新以後漢醫勢力漸衰牛黃遂以不用而成一種輸出品矣四真假及其鑑別法陶弘景曰藥中之貴莫過於牛黃一子至二三分好者值五六千至一萬也現在奉天市價一匁至圓不等昂貴如此贗品自多如以鬱金蒲黃等和於牛膠千金方藥注和漢藥物學或以白泥和於牛膽汁凝為球形或片狀千金藥注而詭為牛黃又或以犛牛駱駝豚等之膽石偽稱為牛黃鑑別似非容易茲將古人之二三法例舉如下本草衍義曰牛黃輕鬆自然微香西式有犛牛黃堅而不香又有駱駝黃極易得亦易相亂不可不審之圖經本草曰然人多偽之試法但偕磨牛角上透甲黃者為真本草述曰置舌上先苦然後甘涼透心者為真千金方藥注曰入口後涼如食薄荷冷澈心胸氣如下降後有香味者為真第三章在中國之牛黃藥用史該藥始用於何時已不可考然神農之本草經已載有之又吳普本草亦記有牛黃無毒牛出入鳴吼者有之夜視有光走角中死則黃入膽中如雞子黃也可知最晚已盛行漢末漢末迄魏應用於何病如何用法及其藥理藥性如何解釋及各時代之見解有何變遷在以下各節稍加討論一牛黃之藥性甲牛黃之氣味吳普本草言牛黃無毒雷斅曰牛黃味苦平有小毒宋之大觀本草言牛黃味苦氣平有小毒宋之日華子本草言牛黃甘涼元之湯液本草言牛黃味苦平有小毒明之本草集要言牛黃味苦平涼有小毒清之本草匯言牛黃味苦甘涼清之本草述言牛黃味苦平有小毒清之本草從新言牛黃甘涼清之本草便讀言牛黃甘苦微涼芳香無毒由以上所述其氣味見解則因人而異乙牛黃之相使相惡雷公藥對載有牛黃人參為使得牡丹菖蒲利耳目惡龍骨地黃龍膽常山蜚蠊畏牛膝乾漆其後千金方外臺秘要新修本草大觀木草湯液本草本草集要本草經疏本草匯本草從新諸書皆有相同之記述則相使相惡之說恐為徐之才等所定而後人竟沿襲盲從且相使相惡亦非一定如龍膽等常可與牛黃並用本草綱目亦言之別錄曰牛黃惡龍膽而錢乙治小兒急疳病驚丸麝香丸皆兩用之何哉龍膽治驚癇解熱殺蟲與牛黃主治相近亦肝經之藥也不應相惡如此按余在當地之漢藥藥鋪調查龍膽亦常可配合而用之二牛黃之用法名醫別錄謂牛黃得之即陰乾百日使燥勿令見日月光雷斅炮炙論曰凡用牛黃搗細研如塵絹裹定以黃嫩牛皮裹懸井中一宿去水三四尺明早取之即古時採取牛黃先於暗處陰乾多日用時研為細末其他各朝代之醫書如新修本草大觀本草湯液本草集要證治準繩本草述本草匯等亦均述如此只懸井水法在雷斅炮炙論以外僅見於本草綱目大抵南北朝以後均為研末而用余之當地調查亦系如此三牛黃之應用牛黃在古時應用於何樣疫病可參考以下諸書神農本草經曰牛黃治驚癇寒熱熱盛狂痙除邪逐鬼別錄云牛黃治小兒百病諸癇熱口不開大人狂癲又墮胎久服輕身增年令人不忘可知用於諸種痙攣性疾病及小兒百病熱病等或用為除邪逐鬼墮胎及長生不老之藥其後用為漸廣至唐朝之千金翼方新修本草內亦記載治上述諸症而藥性本草內有牛黃治小兒夜啼安魂定魄薜邪魅療卒中風千金方內牛黃益肝膽定精神除熱止驚痢辟惡氣止百病茲將當時之處方舉其二三如下千金方曰初生三日去驚邪辟惡氣牛黃一豆許以赤蜜如酸棗研勻綿蘸令小兒吮之一日令盡又曰牛黃丸男子得鬼魅欲死所見驚怖欲走時有休止皆邪氣所致不能自絕牛黃荊實曾青玉屑雄黃空青赤石脂玄參龍膽各一兩上九味篩蜜和服如小豆先食吞一丸日三服稍加以知為度外臺秘要曰小兒七日口噤牛黃研為末以淡竹瀝化一字灌之更以豬乳滴之廣利方曰牛黃一豆許研和蜜水灌之此外千金方中尚載有治小兒宿乳不消腹痛驚啼之處方及治卒中惡邪鬼驚痢大小便不通小兒驚癇客忤等症之牛黃萬病丸之處方此等處方亦皆以牛黃為主劑可知唐代以牛黃多用於諸種痙攣性疾病及小兒百病鬼魅等宋代則其應用尤廣且可用於中風失音口噤健忘虛乏及解毒之目的茲錄當時之處方一二如下太平聖惠方內之小兒腹痛夜啼牛黃一豆許乳汁化服仍書田字於臍下錢氏小兒方初生兒胎熱或身體黃者牛黃一豆大許蜜調膏乳化開時時滴兒口形色不實者勿多服小兒衛生總微論曰小兒驚候小兒驚熱毛焦睡語欲發驚者牛黃六分硃砂五錢同研以犀角磨汁調服一錢竇太師方內有牛黃清心丸治鎖喉毒療寒熱往來京牛黃輕粉各三分膽星一兩雄黃蓮末各二錢茯神玄參天竹黃五倍子荊芥防風桔梗犀角末當歸各一錢冰片麝香珍珠各五分上研為細末公和一處再研勻甘草熬膏和丸如龍眼大硃砂為衣日中曬乾收入瓷瓶內將瓶口緊塞勿令出氣每服一丸薄荷湯磨服惠民和劑局方內有牛黃清心丸治諸風緩縱不隨語言蹇澀心怔健忘恍惚頭目眩胃胸中煩郁痰涎壅塞精神昏憒又治心氣不足神氣不定驚恐怕怖非憂慘虛煩少睡喜怒無時或發狂癲精神昏亂俄頓死舌張不能語四肢拘急心神恍惚不知人牛黃一兩二分研麝香一兩研犀角末二兩雄黃一兩龍腦一兩研羚羊角一兩研蒲黃二兩半乾山藥七兩人參三兩半去蘆當歸去蘆防風黃芩麥門冬去心甘草各五錢桔梗白朮各一兩白芍藥一兩柴胡白茯苓杏仁芎藭一兩二分白蘞七分半乾薑七分半大棗一百枚大豆黃卷研炒阿膠各一兩七分半金箔一千二百箔內四百枚為衣上除棗杏仁金箔二角屑及牛黃麝香雄黃龍腦四味外為細末入余藥勻煉蜜與棗膏為丸每兩作十丸用金箔為衣每服一丸溫水化下食後小兒驚癇即酌度多少以竹葉湯溫化下此外又有牛黃膏治驚化涎涼膈鎮心祛邪熱止痰嗽局方牛黃涼驚丸治小兒驚疳小兒藥證直譯牛黃丸治小兒大便不通心中煩熱太平聖惠方牛黃散治口瘡太平聖惠方元明時代牛黃之應用尤廣牛黃瀉心湯治心經邪熱狂語精神不爽御藥院方牛黃膏治熱入血室發狂活活機要牛黃散治一切熱毒黃疸衄血發斑口咽瘡爛吐血便血時氣發狂神昏不省施圓端效牛黃治痘瘡黑陷王氏痘疹方牛黃丸治驚風五癇天釣客忤牛黃丸治乾疳牛黃散治中風心臟牛黃散治溫壯熱或寒熱往來牛黃解毒丸治胎毒瘡癤及一切瘡瘍牛黃奪命散治馬脾風以上六例證治準繩牛黃散治小兒口中百病鵝口瘡重顎不能吮乳及咽喉頭腫塞一切熱毒萬病回春清朝之牛黃應用大略由下諸例可見梗概本草匯曰牛黃清心主之煩熱狂邪氣俱濟攝肝臟之魂驚癇健忘同療利痰氣而無滯入肋骨搜風本草從新曰牛黃清心解熱利痰涼驚通竅辟邪治中風入臟驚癇口噤本草便讀曰牛黃清心肝之煩熱達竅搜邪假靈氣以生成疏氣解毒驚癇痰迷須取用喉痹痘後最相宜清代之處方書例如牛黃承氣湯化穢利竅保腎安心治溫暑時邪挾渴內閉口噤神昏飛屍卒厥五癇中惡及驚厥之因於熱者溫病條辨牛黃定志丸壓驚鎮心化涎安神治心臟中風昏冒牛黃瀉心湯治火熱牛黃入寶丹治痧症發斑發狂渾身赤紫痧後毒瘡毒瘍以上三例沈氏尊生書方牛黃搜風丸治大麻風瘍醫大全方由清以迄現代牛黃之為用仍盛與從前無異統觀歷朝之文獻可知牛黃在古時已用於治諸種痙攣性疾病及熱病小兒百病等證漸用於墮胎長生隋唐之際更用於神經衰弱宋後迄今且可用為中風健乏虛弱或解毒之目的矣四牛黃之藥理見解金元以前蓋未有論及其藥理者及明代論者漸多茲舉其二三例如下本草綱目曰牛有病在肝膽之間凝結成黃故還以治心肝膽之病盧復曰坤為牛黃為土則黃是牛之本命元辰矣其入肝膽以云之從龍風之從虎不期然而然者李東垣曰牛黃入肝治筋病小兒驚癇口噤大人中風口噤及痙者皆筋病也繆希雍曰牛黃入足厥陰少陽手少陰經其主小兒驚癇寒熱熱盛口不開及大人癲狂癇痙者皆心肝二經邪熱膠痰為病心熱則火自生焰肝熱則木自生風風火相搏則發如上等證此藥能入二經而除熱消痰則風火息神魂消諸證自瘳矣鬼邪侵著心虛所致小兒百病多屬胎熱入心養神除熱解毒故悉主之也性善通竅能墮胎善除熱益心故能令人不忘非久服多服之藥其云輕身延年者蓋指病去則身自輕安而得盡其天年也清朝之本草便讀亦引用李時珍之說其後又有所治之病一切風癇寒熱安魂定魄諸症皆屬肝膽之病本經逢源內有本經治驚癇寒熱狂痙邪鬼皆痰熱所致其效長於清心化熱利痰涼驚安心辟惡故清心牛黃丸以為君故知清時諸家持論與元明時無異按余現在之調查漢醫仍作此見解總之漢醫以為驚癇寒熱熱狂邪氣小兒百病等皆為心肝之病故牛黃既為凝結於肝膽之間者亦必能逆而治之在科學未發達之時此等見解不為無因也總括以上本篇第二第三章所述可總括如下一牛黃即今之膽石二牛黃之別名甚多如土精醜寶醜玄牛菜瞿盧折娜等日本讀音為高瓦屋和名字之乃多末三牛黃之分類不一在中國唐朝以前因取黃之部位不同而有生神黃角中黃心黃肝黃四種之別唐代則專以形態大小而分為散黃漫黃圓黃三種宋後漸因產地而分類以及近日仍沿用之故有東黃西黃蘇尖黃廣黃之別在日木德川時代以前亦似有生神黃等四種之分然現在只有玉牛黃天竺牛黃真牛黃之三種且現代中日兩國均有印度澳洲南北美洲等地之輸入品四牛黃既為高價之物故偽品極多如犛牛駱駝豚等之膽石或鬱金蒲黃白泥及牛膠牛膽之凝和均可詐為牛黃其鑑別則有真牛黃若磨於手甲黃色能深透入內置舌上則先苦後甘涼入胸腑之說五牛黃已於漢以前供入藥品六牛黃之氣味說亦不一或言苦平或言甘涼或言小毒或言無毒其相使相惡則古今相同即人參牡丹菖蒲為可使龍骨常山地黃蜚蠊牛膝乾漆為惡畏七牛黃採取後先經過長期間之陰乾用時研為細末八牛黃在古時只用於癲癇及他之痙攣性疾病小兒百病熱病邪鬼等證其後為用漸廣更可用為中風神經衰弱及解毒之藥九關於牛黃之藥理昔時不明金元以後之醫家方為牛黃既為生於心肝膽間之凝結物反而言之必能治心肝膽之病如癇病狂癲小兒百病熱病中風等諸證第四章日本之牛黃藥用史牛黃何時傳入日本如第一報告已於續日本紀元文武天皇之條內錄有二年正月己巳土佐國獻牛黃十一月己酉下總國獻牛黃可知奈良朝以前已有牛黃之紀載惟確係何時輸入則不可考按漢藥學之東漸由來甚久其直接輸入始於日本之欽明天皇年西紀年有吳人知聰攜藥書明堂圖百十餘卷東至日本但在此事以前已由朝鮮有間接之輸入據歷史有允恭天皇年一月西紀年天皇篤疾求良醫於新羅同年八月醫者金波鎮漢紀武來朝使其療天皇之御疾又欽明天皇年西紀年遣使百濟令其醫博士歷博士易博士更迭來朝且令其攜送各種藥品先於允恭天皇之前或已有韓醫學之輸入亦為一般史家所公認此種韓醫學原非朝鮮之固有乃受中國之漢醫影響而成者故此亦可謂由朝鮮介紹而間接輸入日本如仔細考究允恭天皇之求醫於新羅事在吳普本草成立後約年而在陶弘景之神農本草經成立前約年又欽明天皇之求醫藥於百濟乃陶弘景神農本草經成立後之事由允恭天皇至欽明天皇之時期神農本草經所紀載之藥物已盛行於韓土故無論神農本草經及更早之吳普本草內所記有之牛黃諸藥想當時已有韓土供為藥品按余之推想彼時定有經韓土介紹而至日本之可能欽明天皇年已後已開直接輸入之道其後又年至推古天皇年命醫師惠日福因等留學唐土苦心勵學凡年學成歸國廣為傳播此後更有多數醫家相繼留學故此時日本之漢方醫學非常盛行且由唐供給多量之醫藥然此時唐朝醫學以巢元方之病源候論孫思邈之千金方等為中心故千金方內多數之牛黃處方早經留學生而傳入故牛黃確實在奈良朝以前之推古天皇時期輸入日本然更早於推古天皇之時期是否已由韓氏介紹輸入亦不無可疑也關於牛黃在當時之應用用法藥理見解及其後有何變遷於以下諸條詳加討論一牛黃之藥性牛黃之氣味平安朝以前並無記述在平安朝之藥經太素及康賴本草均謂牛黃苦平有小毒日本戰國時代之藥性能毒大成謂牛黃苦平有小毒一曰甘涼無毒德川時代之和語本草謂牛黃甘涼牛黃之相使相惡奈良朝以前無論及之者至平安朝醫心方內始有牛黃惡龍骨地黃龍膽常山蜚蠊牛膝乾漆人參為之使得牡丹菖蒲利耳目其後戰國時代日本之藥性能毒大成德川時代之和語本草皆作同樣之記載要其持論亦不出乎醫心方之範圍想系牛黃輸入之際即有此說傳自中華至今仍沿用之二牛黃之用法平安朝之康賴本草曰牛黃勿見日月光用之醫心方之合藥料理法內牛黃細末加粉服之藥性能毒大成之牛黃之條謂採取後勿見日光百日陰乾之又曰用時盛乳缽內研細用之德川時代之和語本草曰牛黃研為極細而用故知用法亦與中國古時所施行者相同三牛黃之應用牛黃雖如上所述已於奈良朝前推古於皇之際輸入日本然當時應用於何病已無記載據今日之推測彼時既為漢醫東漸之開始而又以病源候論千金方等為中心當然以千金方等所記載之用法為準繩如驚癇寒熱小兒百病邪鬼狂癲等是惟此時之牛黃均仰供於中國之輸入其應用尚少至奈良朝時方漸盛行由下記錄可以證之奈良東大寺正倉院御庫中收藏之藥物及關於藥物之記錄為日本古代藥物記錄之至寶但奈良朝代所用之藥物記錄已失據他記錄載有天平勝寶年西紀年考謙天皇在父皇聖武天皇忌辰之時賜種種寶物及種之藥物供於東大寺廬舍那佛此種之御藥皆為當時所作為藥用者其御供養之願文以前安置堂內供養廬舍那佛若有緣病苦可用者並知僧網後聽充用伏願服此藥者萬病悉除千苦皆救諾善成就諾惡斷卻自非業道長無夭折遂使命終之後往生花藏世界面奉廬舍那佛必欲證得遍法世界然則牛黃是否亦在種藥物之內雖未載明查當時之御藥目錄及奉廬舍那佛種種藥帖均未載有牛黃又另一記錄即由天平勝寶年至文德天皇之齊衡年約年之間記載進納於正倉院之藥物及其他之雜物出入繼文內麝香一管犀角一枚雄黃一劑犀角杯一口玉杯一枚天平勝寶四年四月八日即天寶年孝謙天皇供養種御藥之前年已有牛黃麝香犀角雄黃之收藏於正會院矣麝香犀角雄黃等既為當時供養之御藥及醫療之用品牛黃亦必於當時博同等之價值惟其用於何病獨無記載想彼時既以千金方病源候論等為本則牛黃之應用亦必循該書等所述無疑再平安朝時代醫心方第卷癇病方曰廣利方孩子驚癇不知人迷悶嚼目方牛黃大豆許和蜜水服立效再同書卷治大腹水腫方曰千金治大腹水腫氣息不通命在旦夕者方牛黃二分昆布十分海藻十分牽牛子八分桂心八分椒目三兩葶藶六兩上七味別搗葶藶熟如膏合和丸如梧子飲服十丸日再稍加小便利為度想惠日福因等留學生所輸入之唐醫學至奈良朝時始盛至平安朝更廣上記諸處方定被當時所採用且此數朝代內牛黃所應用之疾病亦略相同其後鎌倉時代當時代表的處方書如萬安方內亦有牛黃清心丸牛黃萬病丸上回報告參照等處方其他更記載癲病狂痙邪鬼中風毒瘡等多數處方想在此時期宋朝醫學介於僧侶之手而入日本故萬安方內之處方實與宋朝所載者相同牛黃且可用於中風解毒矣其後足利時代應仁之亂前後所謂關白一條兼良之尺素往來內載蘇合丸至寶丸腦麝丸沉麝丸牛黃丸麝香丸菟絲子丸阿伽陀藥並臘藥等當世人人燧袋之底面面小藥器中心齋持之以不得貯為恥辱候云云當時寶貴牛黃概可想見然應用想亦與前代無異更後日本戰國時代之藥性能毒大成曰牛黃入於肝治筋病安魂定魄攘邪綏神益肝膽又清心除熱利痰治健忘及小兒百病狂癇寒熱並男女驚狂等再同書之附方內又載有用牛黃治中風小兒驚風腹痛夜啼痘瘡黑陷之處方藥性能毒大成一書原為蒐集普通之藥品而論其藥性效能之本草由此可想像牛黃在當時為盛用之藥品再後德川時代初期之和語本草有牛黃治小兒百病驚癇寒熱熱盛口噤大人狂癲痙中風失音口噤驚悸小兒驚痢夜啼邪魅中惡健忘墮胎牛黃乃定精神安魂涼熱利痰搜肝風清心逐鬼良藥也同朝末期出版之觀聚方要補內亦云牛黃涼驚丸治小兒胞熱小兒驚疳牛黃人參散治小兒驚熱牛黃丸治小兒百病牛黃瀉心湯治小兒癲疾癇狂牛黃清心丸治中風失音健忘心氣不足神志不定等處方明治維新以後漢藥漸廢牛黃遂失其價值只有少數人尚用以治小兒百病熱病大人狂癲在民間或用為傷寒熱之特效藥以上本草可約而言之牛黃在奈良前已傳入日本當時僅用於痙攣性諸病及小兒百病熱病大人狂癲等奈良平安以後其需要更多至日本戰國時代受宋醫學之影響以迄德川時代日增月益且可用於中風或解毒等至明治維新以後遂與漢醫學同歸零替四牛黃之藥理見解此亦為日本戰國時代以後即金元醫方傳入之時方有論及牛黃之藥性者茲舉二三例如下藥性能毒大成曰牛黃入肝經治筋病安魂定魄攘鬼邪之祟正精神益肝膽和語本草曰牛黃治小兒百病驚癇熱盛口噤因小兒諸病多為胎熱毒疾犯邪惡乃心肝二經之病牛黃涼熱利痰逐惡邪入肝心二經也治大人狂癲痙此皆風火之相搏也牛黃涼心火搜肝風也治驚悸定魂魄安精神清心肝風熱也治中風失音口噤此亦搜肝風涼心熱利痰也治健忘利痰定魂魄精神也諸說均謂牛黃能入心肝故能治心肝之病如驚癇寒熱小兒百病中風口噤等症與金元諸家之說殆相一致總括本章可總括如下一牛黃已於奈良朝前之推古天皇時代傳入日本二牛黃氣味苦平甘涼有毒無毒人各一說其相使相惡亦如中國所論者相同即人參牡丹菖蒲可使龍骨地黃常山蜚蠊牛膝乾漆相惡三牛黃原為由中國傳入故其用法亦如當時所教即經長期間之陰乾研末而用四牛黃之輸入日本適唐醫學以病源候論千金方盛時期故其應用亦如千金方所載者相同如痙攣性諸病小兒百病大人狂癲熱病等症其後牛黃在中國應用漸廣遂亦影響及日本故鎌倉時代更用於治中風健忘虛乏瀉痢大小便不通及解毒之目的迄乎明治維新遂與多數之漢藥廢而不用矣五其藥理之見解古雖不明至日本戰國時代以後受金元醫方之影響亦謂黃乃心肝間之凝結物必逆而治心肝之病如痙病狂癇癲病及小兒百病中風熱病等
